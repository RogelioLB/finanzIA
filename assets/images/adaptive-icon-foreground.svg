<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    Adaptive icon foreground para FinanzIA
    - Fondo: TRANSPARENTE (el backgroundColor #0F0F12 viene del app.config.js)
    - Logo centrado en 512,512 y escalado al 85% para caber en la safe zone de Android (~676px)
    - Safe zone: círculo de r=338 centrado en 512,512
  -->
  <g transform="translate(512,512) scale(0.85) translate(-529,-501)">
    <!-- Trending polyline -->
    <polyline
      points="200,780 380,640 540,720 720,460"
      fill="none"
      stroke="#F5EFE6"
      stroke-width="64"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Arrow head -->
    <polyline
      points="600,460 720,460 720,580"
      fill="none"
      stroke="#F5EFE6"
      stroke-width="64"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Spark -->
    <g transform="translate(800,280)">
      <path d="M 0 -90 L 22 -22 L 90 0 L 22 22 L 0 90 L -22 22 L -90 0 L -22 -22 Z" fill="#FF6B35"/>
      <path d="M 0 -36 L 9 -9 L 36 0 L 9 9 L 0 36 L -9 9 L -36 0 L -9 -9 Z" fill="#F5EFE6"/>
    </g>
  </g>
</svg>
